name: NotesQuick
options:
  bundleIdPrefix: com.notesquick
  deploymentTarget:
    macOS: "14.0"
    iOS: "17.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true

targets:
  NotesQuickMac:
    type: application
    platform: macOS
    sources:
      - NotesQuick/Models
      - NotesQuick/ViewModels
      - NotesQuick/Utilities
      - NotesQuick/Extensions
      - NotesQuick/Views
      - NotesQuickMac/App
      - NotesQuickMac/Views
      - NotesQuickMac/Resources
    settings:
      base:
        PRODUCT_NAME: NotesQuick
        PRODUCT_BUNDLE_IDENTIFIER: com.notesquick.mac
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "15"
        SWIFT_VERSION: "5.9"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.productivity"
        INFOPLIST_KEY_ITSAppUsesNonExemptEncryption: NO
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: "Apple Development"
        DEVELOPMENT_TEAM: "P87G25W6U3"
        CODE_SIGN_ENTITLEMENTS: NotesQuickMac.entitlements

  NotesQuickiOS:
    type: application
    platform: iOS
    sources:
      - NotesQuick/Models
      - NotesQuick/ViewModels
      - NotesQuick/Utilities
      - NotesQuick/Extensions
      - NotesQuick/Views
      - NotesQuickiOS/App
      - NotesQuickiOS/Views
      - NotesQuickiOS/Resources
    settings:
      base:
        PRODUCT_NAME: NotesQuick
        PRODUCT_BUNDLE_IDENTIFIER: com.notesquick.ios
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "15"
        SWIFT_VERSION: "5.9"
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.productivity"
        INFOPLIST_KEY_ITSAppUsesNonExemptEncryption: NO
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        TARGETED_DEVICE_FAMILY: "1,2"
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: "Apple Development"
        DEVELOPMENT_TEAM: "P87G25W6U3"
